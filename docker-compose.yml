services:
  # --- THE GATEKEEPER (NGINX) ---
  proxy:
    image: nginx:alpine
    container_name: hs-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - healthsentinel-network

  # --- THE BRAIN (DATABASE) ---
  db:
    image: postgres:16-alpine
    container_name: hs-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # Removed public ports for security
    networks:
      - healthsentinel-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- THE BACKEND ---
  backend:
    build: ./healthsentinel-backend
    container_name: hs-backend
    restart: always
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - CORS_ORIGINS=http://localhost,http://frontend:3000,http://localhost:80
    depends_on:
      - db
    networks:
      - healthsentinel-network

  # --- THE FRONTEND ---
  frontend:
    build: 
      context: ./healthsentinel-frontend
      args:
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_WS_URL=/ws/patients
    container_name: hs-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - healthsentinel-network

  # --- DEVSECOPS: SONARQUBE ---
  sonarqube:
    image: sonarqube:community
    container_name: hs-sonarqube
    ports:
      - "9000:9000"
    networks:
      - healthsentinel-network
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  # --- DEVSECOPS: JENKINS ---
  jenkins:
    image: jenkins/jenkins:lts
    container_name: hs-jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
    networks:
      - healthsentinel-network
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker

networks:
  healthsentinel-network:
    name: healthsentinel-network
    driver: bridge

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  jenkins_data:
